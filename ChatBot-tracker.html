<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ChatBot | Generador de Preguntas</title>

    <style>

        body.dark .pregunta-item-chat { background: #0e0e10; border-color: #2a2a2e; color: #ccc; }
        body.light .pregunta-item-chat { background: #f8f9fa; border-color: #dee2e6; color: #212529; }
        .pregunta-tipo-badge { background: #ff8c42; color: #0b0b0e; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; min-width: 70px; text-align: center; font-family: 'Comfortaa', sans-serif; }

<body class="dark">
<button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
<div class="app-layout">
    <div class="sidebar" id="sidebar">
        <div>
            <div class="sidebar-header">
                <div class="left-group">
                    <h2><i class="fas fa-comments"></i> ChatBot</h2>
                    <a href="index.html" class="home-btn" title="Ir al inicio"><i class="fas fa-home"></i></a>
                </div>
                <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="#" data-section="generador"><i class="fas fa-edit"></i> Generador</a></li>
                <li><a href="#" data-section="registros"><i class="fas fa-database"></i> Registros guardados</a></li>
            </ul>
            <div class="protection-section">
                <h4><i class="fas fa-shield-alt"></i> Proteger campos</h4>
                <div class="checkbox-grid" id="checkboxesContainer"></div>
            </div>
        </div>
        <div>
            <div class="sidebar-actions">
                <button id="exportarExcelBtn"><i class="fas fa-file-excel"></i> Exportar a Excel</button>
                <button id="guardarCopiaSeguridadBtn"><i class="fas fa-save"></i> Guardar copia de seguridad</button>
                <label for="importarGruposJson" style="cursor:pointer;"><i class="fas fa-upload"></i> Cargar copia de seguridad</label>
                <button id="exportarVectorJsonBtn"><i class="fas fa-download"></i> Exportar a JSON (vector)</button>
                <input type="file" id="importarGruposJson" accept=".json" style="display:none">
                <button id="limpiarHistorialBtn"><i class="fas fa-trash-alt"></i> Limpiar todo el historial</button>
            </div>
            <div class="sidebar-footer"><i class="fas fa-database"></i> LocalStorage automático</div>
        </div>
    </div>
    <div class="main-content">
        <div id="contenidoDinamico"></div>
    </div>
</div>

<script>
    
    let appData = {
        grupos: [],
        borrador: {
            direccion: "", respuesta: "", clasificacion: "", tema: "", palabras_clave: "", abreviaciones: "",
            pregunta1: "", pregunta2: "", pregunta3: ""
        },
        editandoIndex: null,
        protectedFields: {
            direccion: false, respuesta: false, clasificacion: false, tema: false,
            palabras_clave: false, abreviaciones: false, pregunta1: false, pregunta2: false, pregunta3: false
        }
    };
    let currentSection = "generador";
    const contenidoDinamico = document.getElementById('contenidoDinamico');

    
    let currentTheme = localStorage.getItem('chatbotTheme') || 'dark';
    function applyTheme(theme) {
        document.body.classList.remove('dark', 'light');
        document.body.classList.add(theme);
        const toggleBtn = document.getElementById('themeToggle');
        if (toggleBtn) toggleBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        localStorage.setItem('chatbotTheme', theme);
    }
    function toggleTheme() { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(currentTheme); }

    function guardarLocalStorage() {
        localStorage.setItem('chatbotData', JSON.stringify({
            grupos: appData.grupos,
            borrador: appData.borrador,
            editandoIndex: appData.editandoIndex,
            protectedFields: appData.protectedFields
        }));
    }
    function cargarLocalStorage() {
        const saved = localStorage.getItem('chatbotData');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.grupos) {
                    appData.grupos = parsed.grupos;
                    appData.grupos.forEach(g => { if (g.validado === undefined) g.validado = false; });
                }
                if (parsed.borrador) appData.borrador = parsed.borrador;
                if (parsed.editandoIndex !== undefined) appData.editandoIndex = parsed.editandoIndex;
                if (parsed.protectedFields) appData.protectedFields = parsed.protectedFields;
            } catch(e) {}
        }
        guardarLocalStorage();
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    function limpiarCampo(nombreCampo, ignoreProtection = false) {
        if (!ignoreProtection && appData.protectedFields[nombreCampo]) {
            alert(`El campo "${nombreCampo}" está protegido. No se puede borrar con el botón global.`);
            return;
        }
        appData.borrador[nombreCampo] = "";
        guardarLocalStorage();
        renderizarSeccion(currentSection);
    }

    function limpiarFormularioRespetandoProteccion() {
        const p = appData.protectedFields;
        if (!p.direccion) appData.borrador.direccion = "";
        if (!p.respuesta) appData.borrador.respuesta = "";
        if (!p.clasificacion) appData.borrador.clasificacion = "";
        if (!p.tema) appData.borrador.tema = "";
        if (!p.palabras_clave) appData.borrador.palabras_clave = "";
        if (!p.abreviaciones) appData.borrador.abreviaciones = "";
        if (!p.pregunta1) appData.borrador.pregunta1 = "";
        if (!p.pregunta2) appData.borrador.pregunta2 = "";
        if (!p.pregunta3) appData.borrador.pregunta3 = "";
        guardarLocalStorage();
    }
    function resetearModoEdicion() { appData.editandoIndex = null; guardarLocalStorage(); }
    function guardarGrupo() {
        const b = appData.borrador;
        if (!b.direccion.trim() || !b.respuesta.trim() || !b.pregunta1.trim() || !b.pregunta2.trim() || !b.pregunta3.trim()) {
            alert("Completa Dirección, Respuesta y las 3 preguntas.");
            return;
        }
        const palabrasClave = b.palabras_clave.split(',').map(s => s.trim()).filter(s => s);
        const abreviaciones = b.abreviaciones.split(',').map(s => s.trim()).filter(s => s);
        const nuevoGrupo = {
            direccion: b.direccion.trim(),
            respuesta: b.respuesta.trim(),
            clasificacion: b.clasificacion.trim(),
            tema: b.tema.trim(),
            palabras_clave: palabrasClave,
            abreviaciones: abreviaciones,
            preguntas: [b.pregunta1.trim(), b.pregunta2.trim(), b.pregunta3.trim()],
            validado: false
        };
        if (appData.editandoIndex !== null) {
            if (confirm("¿Actualizar este registro?")) {
                nuevoGrupo.validado = appData.grupos[appData.editandoIndex].validado || false;
                appData.grupos[appData.editandoIndex] = nuevoGrupo;
                resetearModoEdicion();
                limpiarFormularioRespetandoProteccion();
                guardarLocalStorage();
                renderizarSeccion(currentSection);
                alert("Registro actualizado.");
            }
        } else {
            appData.grupos.push(nuevoGrupo);
            limpiarFormularioRespetandoProteccion();
            guardarLocalStorage();
            renderizarSeccion(currentSection);
        }
    }

    function editarGrupo(index) {
        const grupo = appData.grupos[index];
        appData.borrador = {
            direccion: grupo.direccion,
            respuesta: grupo.respuesta,
            clasificacion: grupo.clasificacion,

        };

    function eliminarGrupo(index) {
        if (confirm("¿Eliminar este grupo?")) {
            appData.grupos.splice(index, 1);
            if (appData.editandoIndex !== null && appData.editandoIndex >= index) {
                if (appData.editandoIndex === index) resetearModoEdicion();

            }
            guardarLocalStorage();
            renderizarSeccion(currentSection);
        }

    function exportarCopiaSeguridad() {
        if (appData.grupos.length === 0) { alert("No hay grupos guardados."); return; }
        let nombreBase = prompt("Ingresa un nombre para la copia de seguridad:", "backup");
        if (!nombreBase) nombreBase = "backup";
        nombreBase = nombreBase.replace(/[^a-z0-9áéíóúñü_-]/gi, '_');
        const nombreArchivo = `ChatBot-backup-${nombreBase}.json`;
        const dataStr = JSON.stringify(appData.grupos, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = nombreArchivo;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importarCopiaSeguridad(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported) && imported.length && imported[0].direccion !== undefined && imported[0].preguntas) {
                    appData.grupos = imported;
                    appData.grupos.forEach(g => { if (g.validado === undefined) g.validado = false; });
                    resetearModoEdicion();
                    guardarLocalStorage();
                    renderizarSeccion(currentSection);
                    alert("Copia de seguridad cargada.");
                } else alert("Formato inválido.");
            } catch(err) { alert("Error al leer JSON: " + err.message); }
        };
        reader.readAsText(file);
    }
    function obtenerArrayParaVector() {
        const vector = [];
        for (const grupo of appData.grupos) {
            const base = { direccion: grupo.direccion, respuesta: grupo.respuesta, clasificacion: grupo.clasificacion, tema: grupo.tema, palabras_clave: grupo.palabras_clave, abreviaciones: grupo.abreviaciones };
            for (let i = 0; i < grupo.preguntas.length; i++) vector.push({ ...base, pregunta: grupo.preguntas[i] });
        }
        return vector;
    }
    function exportarChatbotExcel() {
        const vector = obtenerArrayParaVector();
        if (!vector.length) { alert("No hay grupos guardados."); return; }
        const headers = ["direccion", "pregunta", "respuesta", "clasificacion", "tema", "palabras_clave", "abreviaciones"];
        const wsData = [headers];
        for (const item of vector) wsData.push([item.direccion, item.pregunta, item.respuesta, item.clasificacion, item.tema, item.palabras_clave.join(", "), item.abreviaciones.join(", ")]);
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Preguntas");
        XLSX.writeFile(wb, `chatbot_preguntas.xlsx`);
    }
    function exportarChatbotJSONVector() {
        const vector = obtenerArrayParaVector();
        if (!vector.length) { alert("No hay grupos guardados."); return; }
        const blob = new Blob([JSON.stringify(vector, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chatbot_preguntas_vector.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function aplicarFiltrosYRenderizar() {
        if (!registrosDynamicContainer) return;
        const grupos = appData.grupos;
        if (!grupos.length) {
            registrosDynamicContainer.innerHTML = `<div class="empty-state">No hay grupos. Crea uno en "Generador".</div>`;
            actualizarStatsBadges(0, 0);
            return;
        }
        const clasificaciones = [...new Set(grupos.map(g => g.clasificacion).filter(c => c && c.trim() !== ""))].sort();
        let filtered = grupos.filter(grupo => {
            if (currentClasificacionFilter !== "todos" && grupo.clasificacion !== currentClasificacionFilter) return false;
            if (currentSearchText.trim() === "") return true;
            const searchLower = currentSearchText.toLowerCase();
            const preguntasMatch = grupo.preguntas.some(p => p.toLowerCase().includes(searchLower));
            const respuestaMatch = grupo.respuesta.toLowerCase().includes(searchLower);
            const direccionMatch = grupo.direccion.toLowerCase().includes(searchLower);
            const clasificacionMatch = grupo.clasificacion.toLowerCase().includes(searchLower);
            const temaMatch = grupo.tema.toLowerCase().includes(searchLower);
            const keywordsMatch = grupo.palabras_clave.some(k => k.toLowerCase().includes(searchLower));
            return preguntasMatch || respuestaMatch || direccionMatch || clasificacionMatch || temaMatch || keywordsMatch;
        });
        actualizarStatsBadges(grupos.length, filtered.length);
        
        let html = `
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Buscar (pregunta/respuesta)</label>
                    <div class="search-wrapper">
                        <input type="text" id="searchTextInput" placeholder="Escribe y presiona Enter" value="${escapeHtml(currentSearchText)}">
                        <button class="clear-search" id="clearSearchBtn" title="Limpiar búsqueda"><i class="fas fa-times-circle"></i></button>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Filtrar por clasificación</label>
                    <select id="clasificacionSelect">
                        <option value="todos" ${currentClasificacionFilter === "todos" ? 'selected' : ''}>Todas</option>
                        ${clasificaciones.map(c => `<option value="${escapeHtml(c)}" ${currentClasificacionFilter === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div id="resultadosContainer"></div>
        `;

            resultadosContainer.innerHTML = `<div class="empty-state">No hay grupos que coincidan con los filtros.</div>`;
        } else {
            let gruposHtml = '';
            filtered.forEach(grupo => {
                const idx = appData.grupos.findIndex(g => g === grupo);
                const validado = grupo.validado ? 'validado' : '';
                gruposHtml += `
                    <div class="grupo-item" data-grupo-idx="${idx}">
                        <div class="grupo-header">
                            <i class="fas fa-chevron-right toggle-icon" style="cursor:pointer;"></i>
                            <div>
                                <button class="btn-icon toggle-validado" data-idx="${idx}" title="${grupo.validado ? 'Desmarcar como confirmado' : 'Marcar como confirmado'}">
                                    <i class="fas ${grupo.validado ? 'fa-times-circle' : 'fa-check-circle'}"></i>
                                </button>
                                <button class="btn-icon editar-grupo" data-index="${idx}" title="Editar"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon eliminar-grupo" data-index="${idx}" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <div class="clasificacion-badge ${validado}">${escapeHtml(grupo.clasificacion) || 'Sin clasificación'}</div>
                        <div class="respuesta-preview">
                            <span class="respuesta-texto">${escapeHtml(grupo.respuesta)}</span>
                            <button class="copy-respuesta-btn" data-respuesta="${escapeHtml(grupo.respuesta)}" title="Copiar respuesta"><i class="fas fa-copy"></i></button>
                        </div>
                        <div class="grupo-details" style="display: none;">
                            <div class="meta-chips">
                                <div class="chip-group"><strong>Dirección</strong><div class="chip-list"><span class="chip-text">${escapeHtml(grupo.direccion) || '—'}</span></div></div>
                                <div class="chip-group"><strong>Tema</strong><div class="chip-list"><span class="chip-text">${escapeHtml(grupo.tema) || '—'}</span></div></div>
                                <div class="chip-group"><strong>Palabras clave</strong><div class="chip-list">${grupo.palabras_clave.length ? grupo.palabras_clave.map(k => `<span class="chip">${escapeHtml(k)}</span>`).join('') : '<span class="chip-text">—</span>'}</div></div>
                                <div class="chip-group"><strong>Abreviaciones</strong><div class="chip-list">${grupo.abreviaciones.length ? grupo.abreviaciones.map(a => `<span class="chip">${escapeHtml(a)}</span>`).join('') : '<span class="chip-text">—</span>'}</div></div>

                                        <span class="pregunta-texto">${escapeHtml(grupo.preguntas[0])}</span>
                                        <button class="copy-pregunta-btn" data-pregunta="${escapeHtml(grupo.preguntas[0])}" title="Copiar pregunta"><i class="fas fa-copy"></i></button>
                                    </div>
                                    <div class="pregunta-item-chat">
                                        <span class="pregunta-tipo-badge">Inferencial</span>
                                        <span class="pregunta-texto">${escapeHtml(grupo.preguntas[1])}</span>
                                        <button class="copy-pregunta-btn" data-pregunta="${escapeHtml(grupo.preguntas[1])}" title="Copiar pregunta"><i class="fas fa-copy"></i></button>
                                    </div>

                                        <span class="pregunta-texto">${escapeHtml(grupo.preguntas[2])}</span>

                                </div>

                        </div>
                    </div>
                `;
            });
            resultadosContainer.innerHTML = gruposHtml;
            attachGruposEvents();
        }
        const searchInput = document.getElementById('searchTextInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        const clasifSelect = document.getElementById('clasificacionSelect');
        if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { currentSearchText = searchInput.value; aplicarFiltrosYRenderizar(); } });
        if (clearBtn) clearBtn.addEventListener('click', () => { currentSearchText = ""; aplicarFiltrosYRenderizar(); });
        if (clasifSelect) clasifSelect.addEventListener('change', (e) => { currentClasificacionFilter = e.target.value; aplicarFiltrosYRenderizar(); });
    }

    function attachGruposEvents() {
        
        document.querySelectorAll('.copy-respuesta-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const texto = btn.getAttribute('data-respuesta');
                if (texto) {
                    navigator.clipboard.writeText(texto).then(() => {
                        const originalIcon = btn.innerHTML;
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => { btn.innerHTML = originalIcon; }, 1000);
                    }).catch(err => console.error('Error al copiar: ', err));
                }
            });
        });
        
        document.querySelectorAll('.toggle-validado').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if (!isNaN(idx) && appData.grupos[idx]) {
                    const grupo = appData.grupos[idx];
                    grupo.validado = !grupo.validado;
                    guardarLocalStorage();
                    const grupoDiv = btn.closest('.grupo-item');
                    if (grupoDiv) {
                        const badge = grupoDiv.querySelector('.clasificacion-badge');
                        if (badge) {
                            if (grupo.validado) badge.classList.add('validado');
                            else badge.classList.remove('validado');
                        }
                        const icon = btn.querySelector('i');
                        if (icon) {
                            if (grupo.validado) {
                                icon.classList.remove('fa-check-circle');
                                icon.classList.add('fa-times-circle');
                                btn.setAttribute('title', 'Desmarcar como confirmado');
                            } else {
                                icon.classList.remove('fa-times-circle');
                                icon.classList.add('fa-check-circle');
                                btn.setAttribute('title', 'Marcar como confirmado');
                            }
                        }
                    }
                }
            });
        });
        
        document.querySelectorAll('.copy-pregunta-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const texto = btn.getAttribute('data-pregunta');
                if (texto) {
                    navigator.clipboard.writeText(texto).then(() => {
                        const originalIcon = btn.innerHTML;
                        btn.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => { btn.innerHTML = originalIcon; }, 1000);
                    }).catch(err => console.error('Error al copiar: ', err));
                }
            });
        });
        
        document.querySelectorAll('.grupo-item').forEach(item => {
            const toggleIcon = item.querySelector('.toggle-icon');
            const detailsDiv = item.querySelector('.grupo-details');
            if (toggleIcon && detailsDiv) {
                const setState = (expanded) => {
                    if (expanded) { detailsDiv.style.display = 'block'; toggleIcon.classList.remove('fa-chevron-right'); toggleIcon.classList.add('fa-chevron-down'); }
                    else { detailsDiv.style.display = 'none'; toggleIcon.classList.remove('fa-chevron-down'); toggleIcon.classList.add('fa-chevron-right'); }
                };
                setState(false);
                toggleIcon.addEventListener('click', (e) => { e.stopPropagation(); const isExpanded = detailsDiv.style.display === 'block'; setState(!isExpanded); });
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.editar-grupo') || e.target.closest('.eliminar-grupo') || e.target.closest('.toggle-icon') || e.target.closest('.toggle-validado') || e.target.closest('.copy-pregunta-btn') || e.target.closest('.copy-respuesta-btn')) return;
                    const isExpanded = detailsDiv.style.display === 'block';
                    setState(!isExpanded);
                });
            }
        });
        
        document.querySelectorAll('.editar-grupo').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const idx = btn.getAttribute('data-index'); if (idx !== null) editarGrupo(parseInt(idx)); });
        });
        document.querySelectorAll('.eliminar-grupo').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const idx = btn.getAttribute('data-index'); if (idx !== null) eliminarGrupo(parseInt(idx)); });
        });
    }

    }

    function renderizarSeccion(seccion) {
        if (seccion === "generador") {
            contenidoDinamico.innerHTML = renderizarGenerador();
            const campos = ['direccion','respuesta','clasificacion','tema','palabras_clave','abreviaciones','pregunta1','pregunta2','pregunta3'];
            campos.forEach(campo => { const el = document.getElementById(campo); if (el) el.addEventListener('input', (e) => { appData.borrador[campo] = e.target.value; guardarLocalStorage(); }); });
            document.querySelectorAll('.clear-field-inside').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const field = btn.getAttribute('data-field');
                    if (field) limpiarCampo(field, true);
                });
            });
            
            document.querySelectorAll('.copy-field-inside').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const field = btn.getAttribute('data-field-copy');
                    if (field) {
                        const inputElement = document.getElementById(field);
                        if (inputElement) {
                            const textToCopy = inputElement.value;
                            navigator.clipboard.writeText(textToCopy).then(() => {
                                const originalIcon = btn.innerHTML;
                                btn.innerHTML = '<i class="fas fa-check"></i>';
                                setTimeout(() => { btn.innerHTML = originalIcon; }, 1000);
                            }).catch(err => console.error('Error al copiar: ', err));
                        }
                    }
                });
            });
            document.getElementById('guardarGrupoBtn').addEventListener('click', guardarGrupo);
            document.getElementById('limpiarFormularioBtn').addEventListener('click', limpiarFormularioManual);
            const cancelBtn = document.getElementById('cancelarEdicionBtn');
            if (cancelBtn) cancelBtn.addEventListener('click', () => { resetearModoEdicion(); limpiarFormularioManual(); renderizarSeccion('generador'); });
        } else if (seccion === "registros") {
            contenidoDinamico.innerHTML = renderizarRegistros();
            registrosDynamicContainer = document.getElementById('registrosDynamicContent');
            if (registrosDynamicContainer) aplicarFiltrosYRenderizar();
        }
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === seccion) link.classList.add('active');
        });
        renderCheckboxes();
    }

    function initNavigation() {
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.getAttribute('data-section');
                if (section) { currentSection = section; renderizarSeccion(section); if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); }
            });
        });
    }
    function initGlobalEvents() {
        document.getElementById('exportarExcelBtn').addEventListener('click', exportarChatbotExcel);
        document.getElementById('exportarVectorJsonBtn').addEventListener('click', exportarChatbotJSONVector);
        document.getElementById('guardarCopiaSeguridadBtn').addEventListener('click', exportarCopiaSeguridad);
        document.getElementById('limpiarHistorialBtn').addEventListener('click', limpiarTodoHistorial);
        const importFile = document.getElementById('importarGruposJson');
        importFile.addEventListener('change', (e) => { if (e.target.files.length) importarCopiaSeguridad(e.target.files[0]); e.target.value = ''; });
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        mobileBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
        document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !mobileBtn.contains(e.target)) sidebar.classList.remove('open'); });
        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    }

    cargarLocalStorage();
    applyTheme(currentTheme);
    initNavigation();
    initGlobalEvents();
    renderizarSeccion('generador');
    currentSection = 'generador';
</script>
</body>
</html>
