<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDelgado - Módulos</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter (elegante) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #1a1a1c, #0b0b0e);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: #141416;
            border-radius: 4px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 140, 0, 0.12);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.25s ease;
            text-align: center;
        }

        .card:hover {
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 100, 0, 0.35);
            transform: translateY(-2px);
        }

        .foto-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .foto-perfil {
            width: 120px;
            height: 120px;
            border-radius: 2px;
            object-fit: cover;
            border: 2px solid #2e2e32;
            box-shadow: 0 0 0 1px #ff6a1a30, 0 8px 20px rgba(0, 0, 0, 0.3);
            background-color: #1f1f23;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f5f5f5 30%, #cfcfcf 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        .subtitulo {
            color: #b9a27b;
            font-weight: 500;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #2c2c30;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .modulos-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .btn-modulo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.9rem;
            background: #1f1f23;
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 2px;
            transition: all 0.2s ease;
            border: 1px solid #2e2e32;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .btn-modulo i {
            font-size: 1.4rem;
            color: #ff8c42;
            transition: transform 0.1s;
        }

        .btn-modulo:hover {
            background: #0c0c0e;
            border-color: #ff8c42;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 140, 66, 0.3);
            transform: translateY(-1px);
        }

        .btn-modulo:hover i {
            color: #ffb347;
            text-shadow: 0 0 3px #ff8c4270;
        }

        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.68rem;
            color: #6a6a70;
            background: #0e0e10;
            padding: 0.7rem;
            border-left: 2px solid #ff8c42;
            text-align: center;
            letter-spacing: 0.4px;
        }

        @media (max-width: 520px) {
            body { padding: 1rem; }
            .card { padding: 1.5rem; }
            .btn-modulo { font-size: 0.9rem; padding: 0.8rem; gap: 0.7rem; }
            .foto-perfil { width: 100px; height: 100px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="foto-wrapper">
            <img class="foto-perfil" 
                 src="https://ui-avatars.com/api/?background=2C2C30&color=ff8c42&rounded=false&size=120&fontsize=0.5&bold=true&name=CD" 
                 alt="Profile Executive">
        </div>
        <h1>César Delgado</h1>
        <div class="subtitulo">Coordinación escolar</div>

        <div class="modulos-list">
            <a href="RN-tracker.html" class="btn-modulo">
                <i class="fas fa-gavel"></i> <span>Reglas de Negocio</span>
            </a>
            <a href="ChatBot-tracker.html" class="btn-modulo">
                <i class="fas fa-comments"></i> <span>ChatBot de Preguntas</span>
            </a>
        </div>
        <div class="footer-note">
            <i class="fas fa-phone" style="margin-right: 6px; color:#ff8c42;"></i> 55-6173-0068
        </div>
    </div>
</body>
</html>
