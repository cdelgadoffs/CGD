<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de glosario – traducciones</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a1a; font-size: 14px; line-height: 1.6; }
    .shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .sidebar-principal {
      width: 200px; min-width: 200px; border-right: 1px solid #e0e0e0;
      background: #f7f7f7; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-secundario {
      width: 200px; min-width: 200px; border-right: 1px solid #e8e8e8;
      background: #fafafa; display: flex; flex-direction: column; flex-shrink: 0;
      transition: all 0.15s; overflow: hidden;
    }
    .sidebar-secundario.hidden { width: 0; min-width: 0; border: none; padding: 0; overflow: hidden; opacity: 0; pointer-events: none; }
    .sidebar-terciario {
      width: 220px; min-width: 220px; border-right: 1px solid #d0d0d0;
      background: #eaeaea; display: flex; flex-direction: column; flex-shrink: 0;
      transition: all 0.15s; overflow: hidden;
    }
    .sidebar-terciario.hidden { width: 0; min-width: 0; border: none; padding: 0; overflow: hidden; opacity: 0; pointer-events: none; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: #fff;
      transition: margin-right 0.25s ease;
    }

    .sidebar-derecho {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: #f5f5f5;
      border-left: 1px solid #d0d0d0;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 12px rgba(0,0,0,0.05);
    }
    .sidebar-derecho.open { transform: translateX(0); }
    .sidebar-derecho .sb-header {
      padding: 16px 20px;
      border-bottom: 1px solid #d0d0d0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidebar-derecho .sb-header .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-derecho .sb-header .sb-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .sidebar-derecho .sb-header .btn-close-derecho {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #888;
      padding: 0 4px;
      transition: color 0.15s;
    }
    .sidebar-derecho .sb-header .btn-close-derecho:hover { color: #1a1a1a; }
    .sidebar-derecho .sb-header .filtro-input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
    }
    .sidebar-derecho .sb-header .filtro-input:focus {
      outline: none;
      border-color: #1a1a1a;
    }
    .sidebar-derecho .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar-derecho .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      font-size: 12.5px;
      color: #555;
      transition: all .15s;
      font-weight: 400;
    }
    .sidebar-derecho .nav-item:hover { background: #e8e8e8; color: #1a1a1a; }
    .sidebar-derecho .nav-item.active {
      border-left-color: #1a1a1a;
      background: #e0e0e0;
      color: #1a1a1a;
      font-weight: 700;
    }
    .sidebar-derecho .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: .4;
      flex-shrink: 0;
    }
    .sidebar-derecho .nav-item.active .nav-dot { opacity: 1; }

    .btn-toggle-derecho {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 6px 0 0 6px;
      padding: 12px 8px;
      cursor: pointer;
      font-size: 14px;
      z-index: 99;
      transition: all 0.2s;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
      font-weight: 500;
      box-shadow: -2px 0 8px rgba(0,0,0,0.1);
    }
    .btn-toggle-derecho:hover { background: #333; padding-right: 12px; }
    .btn-toggle-derecho.hidden { display: none; }

    .main.shifted { margin-right: 320px; }

    .sb-header { padding: 16px 16px 12px; border-bottom: 1px solid #d0d0d0; display: flex; flex-direction: column; gap: 4px; }
    .sb-header-top { display: flex; align-items: center; justify-content: space-between; }
    .sb-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: #777; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2px; }
    .sb-title { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
    .sb-subtitle { font-size: 11px; color: #999; margin-top: 2px; }

    .btn-add {
      background: none; border: 1px solid #ccc; border-radius: 4px;
      width: 28px; height: 28px; font-size: 18px; font-weight: 300;
      color: #555; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .btn-add:hover { background: #d0d0d0; border-color: #aaa; }

    .sb-nav { padding: 8px 0; flex: 1; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 16px;
      cursor: pointer; border-left: 2px solid transparent;
      font-size: 12.5px; color: #555; transition: all .15s;
      font-weight: 400;
    }
    .nav-item:hover { background: #e8e8e8; color: #1a1a1a; }
    .nav-item.active {
      border-left-color: #1a1a1a; background: #e0e0e0; color: #1a1a1a;
      font-weight: 700;
    }
    .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .4; flex-shrink: 0; }
    .nav-item.active .nav-dot { opacity: 1; }

    .badge-total {
      background: #e0e0e0;
      border-radius: 10px;
      padding: 0 6px;
      font-size: 10px;
      color: #666;
      font-weight: 500;
      margin-left: auto;
      line-height: 1.6;
    }

    .doc-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #e8e8e8; }
    .doc-type { font-family: 'DM Mono', monospace; font-size: 10px; color: #999; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
    .doc-title { font-size: 22px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
    .doc-sub { font-size: 13px; color: #666; margin-bottom: 10px; }

    .detalle-variante {
      padding: 20px; border: 1px solid #e8e8e8; border-radius: 6px;
      margin-bottom: 20px; background: #fafafa;
    }
    .detalle-variante .campo {
      margin-bottom: 16px;
    }
    .detalle-variante .campo label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      margin-bottom: 4px;
    }
    .detalle-variante .campo input,
    .detalle-variante .campo textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
    }
    .detalle-variante .campo input:focus,
    .detalle-variante .campo textarea:focus {
      outline: none;
      border-color: #1a1a1a;
    }
    .detalle-variante .campo textarea { min-height: 60px; resize: vertical; }

    .acciones-variante {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn-eliminar, .btn-guardar {
      background: none; border: 1px solid #ddd; border-radius: 4px;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
      color: #555; padding: 6px 16px;
      font-family: inherit;
    }
    .btn-eliminar:hover { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }
    .btn-guardar { background: #1a1a1a; color: #fff; border: none; }
    .btn-guardar:hover { background: #333; }
    .btn-excel {
      background: #1a56db; color: #fff; border: none; padding: 8px 24px;
      border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-excel:hover { background: #0d3b8c; }

    .btn-backup {
      background: #e5e5e5; color: #333; border: none; padding: 8px 16px;
      border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s; display: flex; align-items: center; gap: 8px;
      width: 100%; justify-content: center;
    }
    .btn-backup:hover { background: #d4d4d4; }
    .btn-backup.connected { background: #dcfce7; color: #166534; }
    .btn-backup.connected:hover { background: #bbf7d0; }
    .btn-backup.error { background: #fee2e2; color: #991b1b; }
    .btn-backup.error:hover { background: #fecaca; }

    .dot-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .dot-indicator.connected { background: #22c55e; }
    .dot-indicator.error { background: #ef4444; }

    .btn-backup .nombre-carpeta {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .placeholder-msg { padding: 40px 20px; text-align: center; color: #999; font-size: 14px; }
    .placeholder-msg strong { color: #666; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: #fff; border-radius: 8px; padding: 24px 28px;
      max-width: 500px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-content h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .modal-content label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #444; }
    .modal-content input, .modal-content textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 14px; font-family: inherit; margin-bottom: 16px;
    }
    .modal-content input:focus, .modal-content textarea:focus { outline: none; border-color: #1a1a1a; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-actions button { padding: 6px 20px; border-radius: 4px; border: none; font-size: 13px; cursor: pointer; transition: background 0.15s; }
    .modal-actions .btn-cancel { background: #f0f0f0; color: #555; }
    .modal-actions .btn-cancel:hover { background: #e0e0e0; }
    .modal-actions .btn-confirm { background: #1a1a1a; color: #fff; }
    .modal-actions .btn-confirm:hover { background: #333; }

    .backup-bar {
      padding: 8px 16px;
      border-top: 1px solid #d0d0d0;
      flex-shrink: 0;
      background: #fafafa;
    }

    @media (max-width: 1100px) {
      .sidebar-terciario { width: 180px; min-width: 180px; }
      .sidebar-derecho { width: 280px; }
      .main.shifted { margin-right: 280px; }
    }
    @media (max-width: 900px) {
      .sidebar-principal { width: 140px; min-width: 140px; }
      .sidebar-secundario { width: 150px; min-width: 150px; }
      .sidebar-terciario { width: 150px; min-width: 150px; }
      .sidebar-derecho { width: 260px; }
      .main.shifted { margin-right: 260px; }
      .main { padding: 20px; }
    }
    @media (max-width: 640px) {
      .shell { flex-direction: column; height: auto; overflow: visible; }
      .sidebar-principal, .sidebar-secundario, .sidebar-terciario {
        width: 100%; min-width: unset; border-right: none;
        border-bottom: 1px solid #d0d0d0; max-height: 200px; overflow-y: auto;
      }
      .sidebar-terciario.hidden { display: none; }
      .sidebar-derecho { width: 100%; max-width: 320px; }
      .main.shifted { margin-right: 0; }
      .btn-toggle-derecho { display: none; }
      .main { overflow-y: visible; height: auto; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR PRINCIPAL: CONCEPTOS -->
  <aside class="sidebar-principal">
    <div class="sb-header">
      <div class="sb-badge">Glosario</div>
      <div class="sb-header-top">
        <span class="sb-title">Conceptos</span>
        <button class="btn-add" id="btnAgregarConcepto">+</button>
      </div>
      <div class="sb-subtitle" id="conceptosSubtitle">0 conceptos</div>
    </div>
    <nav class="sb-nav" id="navConceptos"></nav>
    <div class="backup-bar">
      <button class="btn-backup" id="btnSeleccionarCarpeta">
        <span class="dot-indicator" id="dotIndicator"></span>
        <span class="nombre-carpeta" id="carpetaNombre">Seleccionar carpeta</span>
      </button>
    </div>
    <button class="btn-excel" id="btnExportarExcel" style="margin:0 16px 8px; width:calc(100% - 32px);">Exportar a Excel</button>
  </aside>

  <!-- SIDEBAR SECUNDARIO: LENGUAS FIJAS (FILTRO) -->
  <aside class="sidebar-secundario hidden" id="sidebarSecundario">
    <div class="sb-header">
      <div class="sb-badge">Filtro</div>
      <div class="sb-header-top">
        <span class="sb-title">Lenguas</span>
      </div>
      <div class="sb-subtitle" id="lenguasSubtitle">0 lenguas</div>
    </div>
    <nav class="sb-nav" id="navLenguas"></nav>
  </aside>

  <!-- SIDEBAR TERCIARIO: VARIANTES -->
  <aside class="sidebar-terciario hidden" id="sidebarTerciario">
    <div class="sb-header">
      <div class="sb-badge">Variantes</div>
      <div class="sb-header-top">
        <span class="sb-title" id="terTitle">Variantes</span>
        <button class="btn-add" id="btnAgregarVariante">+</button>
      </div>
      <div class="sb-subtitle" id="variantesSubtitle">0 variantes</div>
    </div>
    <nav class="sb-nav" id="navVariantes"></nav>
  </aside>

  <!-- PANEL PRINCIPAL -->
  <main class="main" id="panelPrincipal">
    <div class="placeholder-msg">
      <strong>Selecciona un concepto</strong><br>
      y luego una lengua para ver sus variantes.
    </div>
  </main>

  <!-- SIDEBAR DERECHO (ESQUEMA) -->
  <div class="sidebar-derecho" id="sidebarDerecho">
    <div class="sb-header">
      <div class="header-top">
        <span class="sb-title">Esquema completo</span>
        <button class="btn-close-derecho" id="btnCerrarDerecho">✕</button>
      </div>
      <input type="text" class="filtro-input" id="filtroEsquema" placeholder="Buscar..." />
    </div>
    <nav class="sb-nav" id="navEsquema"></nav>
  </div>

  <button class="btn-toggle-derecho hidden" id="btnToggleDerecho">Esquema</button>

</div>

<!-- MODALES -->
<div class="modal-overlay" id="modalAgregarConcepto">
  <div class="modal-content">
    <h3>Nuevo concepto</h3>
    <label>Español</label>
    <input type="text" id="inputEspanol" placeholder="Ej. Apelación" />
    <label>Código (3 letras mayúsculas)</label>
    <input type="text" id="inputCodigo" placeholder="Ej. APL" maxlength="3" style="text-transform:uppercase;" />
    <div class="modal-actions">
      <button class="btn-cancel" id="modalConceptoCancel">Cancelar</button>
      <button class="btn-confirm" id="modalConceptoConfirm">Crear</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAgregarVariante">
  <div class="modal-content">
    <h3>Nueva variante</h3>
    <p style="margin-bottom:12px; color:#666; font-size:13px;">
      Se agregará al concepto <strong id="modalConceptoNombre">—</strong> y lengua <strong id="modalLenguaNombre">—</strong>
    </p>
    <label>Nombre de la variante</label>
    <input type="text" id="inputVariante" placeholder="Ej. Náhuatl de la Huasteca Oriental" />
    <label>Traducción</label>
    <input type="text" id="inputTraduccion" placeholder="Traducción del concepto" />
    <label>Uso en contexto</label>
    <textarea id="inputUso" placeholder="Frase de ejemplo"></textarea>
    <label>Traducción del uso en contexto</label>
    <textarea id="inputTraduccionUso" placeholder="Traducción de la frase"></textarea>
    <label>Código ISO</label>
    <input type="text" id="inputIso" placeholder="Ej. nhe" />
    <div class="modal-actions">
      <button class="btn-cancel" id="modalVarianteCancel">Cancelar</button>
      <button class="btn-confirm" id="modalVarianteConfirm">Crear</button>
    </div>
  </div>
</div>

<script>
  // ========== ESTADO ==========
  let conceptos = [];
  let conceptoSeleccionadoId = null;
  let lenguaSeleccionadaId = null;
  let varianteSeleccionadaId = null;

  const LENGUAS_FIJAS = [
    { id: 'leng_nahuatl', nombre: 'Náhuatl' },
    { id: 'leng_maya', nombre: 'Maya' },
    { id: 'leng_zapoteco', nombre: 'Zapoteco' },
    { id: 'leng_mixteco', nombre: 'Mixteco' },
    { id: 'leng_otomi', nombre: 'Otomí' }
  ];

  const STORAGE_KEY = 'glosarioData';
  const SIDEBAR_DERECHO_KEY = 'sidebarDerechoOpen';

  // ========== PERSISTENCIA LOCAL (datos) ==========
  function cargarDesdeLocalStorage() {
    const data = localStorage.getItem(STORAGE_KEY);
    if (!data) return null;
    try { return JSON.parse(data); } catch { return null; }
  }
  function guardarEnLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(conceptos));
    realizarRespaldoAutomatico();
  }

  // ========== FILE SYSTEM ACCESS (respaldo en carpeta) ==========
  let directorioHandle = null;
  const DIR_HANDLE_KEY = 'glosarioDirHandle';

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('GlosarioDirDB', 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('handles')) {
          db.createObjectStore('handles');
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function saveDirectoryHandle(handle) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('handles', 'readwrite');
      const store = tx.objectStore('handles');
      const request = store.put(handle, 'dirHandle');
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  async function getDirectoryHandle() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('handles', 'readonly');
      const store = tx.objectStore('handles');
      const request = store.get('dirHandle');
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function seleccionarCarpeta() {
    try {
      if (!window.showDirectoryPicker) {
        alert('Tu navegador no soporta la API File System Access. Usa Chrome o Edge.');
        return;
      }
      const handle = await window.showDirectoryPicker();
      const permiso = await handle.requestPermission({ mode: 'readwrite' });
      if (permiso === 'granted') {
        directorioHandle = handle;
        await saveDirectoryHandle(handle);
        actualizarEstadoBackup('connected', handle.name);
        await realizarRespaldoAutomatico(true);
      } else {
        alert('Permiso denegado para escribir en la carpeta.');
        actualizarEstadoBackup('error', null);
      }
    } catch (err) {
      console.error('Error seleccionando carpeta:', err);
      actualizarEstadoBackup('error', null);
    }
  }

  async function restaurarHandle() {
    try {
      const handle = await getDirectoryHandle();
      if (handle) {
        const permiso = await handle.requestPermission({ mode: 'readwrite' });
        if (permiso === 'granted') {
          directorioHandle = handle;
          actualizarEstadoBackup('connected', handle.name);
          return true;
        } else {
          actualizarEstadoBackup('error', null);
          return false;
        }
      } else {
        actualizarEstadoBackup('disconnected', null);
        return false;
      }
    } catch (err) {
      console.error('Error restaurando handle:', err);
      actualizarEstadoBackup('error', null);
      return false;
    }
  }

  function actualizarEstadoBackup(estado, nombreCarpeta) {
    const btn = document.getElementById('btnSeleccionarCarpeta');
    const dot = document.getElementById('dotIndicator');
    const nombreEl = document.getElementById('carpetaNombre');
    if (!btn || !dot || !nombreEl) return;

    // Limpiar clases
    btn.classList.remove('connected', 'error');
    dot.classList.remove('connected', 'error');

    if (estado === 'connected') {
      btn.classList.add('connected');
      dot.classList.add('connected');
      nombreEl.textContent = nombreCarpeta || 'Carpeta conectada';
    } else if (estado === 'error') {
      btn.classList.add('error');
      dot.classList.add('error');
      nombreEl.textContent = 'Error de conexión';
    } else {
      // disconnected o por defecto
      nombreEl.textContent = 'Seleccionar carpeta';
    }
  }

  function getNombreBackup() {
    const now = new Date();
    const d = String(now.getDate()).padStart(2, '0');
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const a = String(now.getFullYear()).slice(-2);
    return `Glosario-${d}${m}${a}.json`;
  }

  async function realizarRespaldoAutomatico(forzar = false) {
    if (!directorioHandle) {
      const restaurado = await restaurarHandle();
      if (!restaurado) return;
    }
    if (!directorioHandle) return;

    try {
      const nombreArchivo = getNombreBackup();
      const contenido = JSON.stringify(conceptos, null, 2);
      let archivoHandle;
      try {
        archivoHandle = await directorioHandle.getFileHandle(nombreArchivo, { create: true });
      } catch (e) {
        archivoHandle = await directorioHandle.getFileHandle(nombreArchivo, { create: true });
      }
      const writable = await archivoHandle.createWritable();
      await writable.write(contenido);
      await writable.close();
      console.log(`Respaldo automático guardado: ${nombreArchivo}`);
      // Mostrar nombre del archivo en el botón (opcional)
      // actualizarEstadoBackup('connected', directorioHandle.name);
    } catch (err) {
      console.error('Error al hacer respaldo automático:', err);
      actualizarEstadoBackup('error', null);
    }
  }

  // ========== UTILIDADES ==========
  function generarCodigo(espanol) {
    if (!espanol) return '';
    const palabras = espanol.trim().split(/\s+/);
    let cod = '';
    for (let p of palabras) {
      if (p.length > 0) cod += p[0].toUpperCase();
      if (cod.length >= 3) break;
    }
    while (cod.length < 3) cod += 'X';
    return cod.slice(0,3);
  }

  function obtenerConcepto(id) {
    return conceptos.find(c => c.id === id);
  }

  function obtenerLenguas(conceptoId) {
    const conc = obtenerConcepto(conceptoId);
    return conc ? conc.lenguas : [];
  }

  function obtenerVariantes(conceptoId, lenguaId) {
    const lenguas = obtenerLenguas(conceptoId);
    const lengua = lenguas.find(l => l.id === lenguaId);
    return lengua ? lengua.variantes : [];
  }

  function asegurarLenguasEnConcepto(concepto) {
    let actualizados = false;
    LENGUAS_FIJAS.forEach(lengFija => {
      if (!concepto.lenguas.some(l => l.id === lengFija.id)) {
        concepto.lenguas.push({
          id: lengFija.id,
          nombre: lengFija.nombre,
          variantes: []
        });
        actualizados = true;
      }
    });
    concepto.lenguas = concepto.lenguas.filter(l => LENGUAS_FIJAS.some(f => f.id === l.id));
    return actualizados;
  }

    conceptos.forEach(conc => {

      div.innerHTML = `<span class="nav-dot"></span> ${conc.codigo} – ${conc.espanol}`;
      div.addEventListener('click', () => {

        if (lenguas.length > 0) {
          lenguaSeleccionadaId = lenguas[0].id;

        <button class="btn-eliminar" id="btnEliminarConcepto" style="border-color:#ef4444; color:#b91c1c;">Eliminar concepto</button>
      </div>
    `;

    if (!lenguaSeleccionadaId) {
      html += `<div class="placeholder-msg" style="margin-top:20px;"><strong>Selecciona una lengua</strong> para ver sus variantes.</div>`;
    } else {
      const lengua = obtenerLenguas(conceptoSeleccionadoId).find(l => l.id === lenguaSeleccionadaId);
      if (!lengua) {
        html += `<div class="placeholder-msg" style="margin-top:20px;">La lengua seleccionada ya no existe.</div>`;
      } else {
        html += `<div style="margin-top:20px; padding:16px; background:#f7f7f7; border-radius:6px;">
          <strong>Lengua:</strong> ${lengua.nombre} (${lengua.variantes.length} variantes)
        </div>`;

          html += `<div class="placeholder-msg" style="margin-top:20px;"><strong>Selecciona una variante</strong> para editar sus datos o agrega una nueva.</div>`;
        }
      }
    }

    panelPrincipal.innerHTML = html;

    document.getElementById('btnEliminarConcepto')?.addEventListener('click', () => {
      if (confirm(`¿Eliminar el concepto "${conc.espanol}" y todos sus datos?`)) {
        const idx = conceptos.findIndex(c => c.id === conceptoSeleccionadoId);
        if (idx !== -1) {
          conceptos.splice(idx, 1);
          conceptoSeleccionadoId = null;
          lenguaSeleccionadaId = null;
          varianteSeleccionadaId = null;
          guardarEnLocalStorage();
          renderConceptos();
          renderLenguas();
          renderVariantes();
          mostrarPanelInicial();
          renderSidebarDerecho();

    document.getElementById('btnGuardarVariante').addEventListener('click', () => {

      const uso = document.getElementById('editUso').value.trim();

        renderVariantes();
        mostrarPanelInicial();
        renderSidebarDerecho();

  // ========== SIDEBAR DERECHO (ESQUEMA) ==========
  function renderSidebarDerecho() {
    navEsquema.innerHTML = '';
    const filtro = filtroEsquema.value.toLowerCase().trim();

    let items = [];
    conceptos.forEach(conc => {
      conc.lenguas.forEach(leng => {
        leng.variantes.forEach(varObj => {
          const texto = `${conc.codigo} ${conc.espanol} ${leng.nombre} ${varObj.nombre} ${varObj.traduccion || ''} ${varObj.uso || ''} ${varObj.traduccionUso || ''} ${varObj.iso || ''}`.toLowerCase();
          if (filtro && !texto.includes(filtro)) return;
          items.push({
            id: varObj.id,
            label: `${conc.codigo} · ${conc.espanol} · ${leng.nombre} · ${varObj.nombre}`,
            conceptoId: conc.id,
            lenguaId: leng.id,
            varianteId: varObj.id
          });
        });
      });
    });

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.style.padding = '20px';
      empty.style.color = '#999';
      empty.style.fontSize = '13px';
      empty.textContent = filtro ? 'No se encontraron variantes.' : 'No hay variantes.';
      navEsquema.appendChild(empty);
      return;
    }

    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'nav-item';
      if (item.varianteId === varianteSeleccionadaId &&
          item.conceptoId === conceptoSeleccionadoId &&
          item.lenguaId === lenguaSeleccionadaId) {
        div.classList.add('active');
      }
      div.innerHTML = `<span class="nav-dot"></span> ${item.label}`;
      div.addEventListener('click', () => {
        conceptoSeleccionadoId = item.conceptoId;
        lenguaSeleccionadaId = item.lenguaId;
        varianteSeleccionadaId = item.varianteId;
        renderConceptos();
        renderLenguas();
        renderVariantes();
        mostrarVariante(item.varianteId);
        renderSidebarDerecho();
        sidebarSecundario.classList.remove('hidden');
        sidebarTerciario.classList.remove('hidden');
      });
      navEsquema.appendChild(div);
    });
  }

  // ========== TOGGLE SIDEBAR DERECHO ==========
  function toggleSidebarDerecho(open) {
    if (typeof open === 'boolean') {
      if (open) {
        sidebarDerecho.classList.add('open');
        document.querySelector('.main').classList.add('shifted');
        localStorage.setItem(SIDEBAR_DERECHO_KEY, 'true');
      } else {
        sidebarDerecho.classList.remove('open');
        document.querySelector('.main').classList.remove('shifted');
        localStorage.setItem(SIDEBAR_DERECHO_KEY, 'false');
      }
    } else {
      const isOpen = sidebarDerecho.classList.contains('open');
      toggleSidebarDerecho(!isOpen);
    }
  }

  // ========== AGREGAR CONCEPTO ==========
  function abrirModalConcepto() {
    modalConcepto.classList.add('active');
    inputEspanol.value = '';
    inputCodigo.value = '';
    inputEspanol.focus();
  }
  function cerrarModalConcepto() { modalConcepto.classList.remove('active'); }

  function agregarConcepto() {
    const espanol = inputEspanol.value.trim();
    let codigo = inputCodigo.value.trim().toUpperCase();
    if (!espanol) { alert('El concepto en español es obligatorio.'); return; }
    if (!codigo) codigo = generarCodigo(espanol);
    if (codigo.length !== 3) { alert('El código debe tener exactamente 3 letras.'); return; }
    if (conceptos.some(c => c.codigo === codigo)) {
      alert(`Ya existe un concepto con el código ${codigo}.`);
      return;
    }
    const nuevo = {
      id: 'conc_' + Date.now(),
      codigo: codigo,
      espanol: espanol,
      lenguas: []
    };
    LENGUAS_FIJAS.forEach(lf => {
      nuevo.lenguas.push({
        id: lf.id,
        nombre: lf.nombre,
        variantes: []
      });
    });
    conceptos.push(nuevo);
    guardarEnLocalStorage();
    cerrarModalConcepto();
    conceptoSeleccionadoId = nuevo.id;
    lenguaSeleccionadaId = LENGUAS_FIJAS[0].id;
    varianteSeleccionadaId = null;
    renderConceptos();
    renderLenguas();
    renderVariantes();
    mostrarPanelInicial();
    renderSidebarDerecho();
    sidebarSecundario.classList.remove('hidden');
    sidebarTerciario.classList.remove('hidden');
  }

  // ========== AGREGAR VARIANTE ==========
  function abrirModalVariante() {
    if (!conceptoSeleccionadoId || !lenguaSeleccionadaId) {
      alert('Primero selecciona un concepto y una lengua.');
      return;
    }
    const conc = obtenerConcepto(conceptoSeleccionadoId);
    const lengua = conc?.lenguas.find(l => l.id === lenguaSeleccionadaId);
    if (!conc || !lengua) {
      alert('No se encontró el concepto o la lengua.');
      return;
    }
    modalConceptoNombre.textContent = conc.espanol;
    modalLenguaNombre.textContent = lengua.nombre;
    modalVariante.classList.add('active');
    inputVariante.value = '';
    inputTraduccion.value = '';
    inputUso.value = '';
    inputTraduccionUso.value = '';
    inputIso.value = '';
    inputVariante.focus();
  }
  function cerrarModalVariante() { modalVariante.classList.remove('active'); }

  function agregarVariante() {
    const nombre = inputVariante.value.trim();
    if (!nombre) { alert('El nombre de la variante es obligatorio.'); return; }
    const conc = obtenerConcepto(conceptoSeleccionadoId);
    if (!conc) return;
    const lengua = conc.lenguas.find(l => l.id === lenguaSeleccionadaId);
    if (!lengua) return;
    if (lengua.variantes.some(v => v.nombre.toLowerCase() === nombre.toLowerCase())) {
      alert(`Ya existe la variante "${nombre}" en esta lengua.`);
      return;
    }
    const nueva = {
      id: 'var_' + Date.now(),
      nombre: nombre,
      traduccion: inputTraduccion.value.trim(),
      uso: inputUso.value.trim(),
      traduccionUso: inputTraduccionUso.value.trim(),
      iso: inputIso.value.trim()
    };
    lengua.variantes.push(nueva);
    guardarEnLocalStorage();
    cerrarModalVariante();
    varianteSeleccionadaId = nueva.id;
    renderVariantes();
    mostrarVariante(nueva.id);
    renderSidebarDerecho();
  }

  // ========== EXPORTAR A EXCEL ==========
  function exportarExcel() {
    const datos = [];
    datos.push(['Concepto', 'Español', 'Lengua', 'Variante', 'Traducción', 'Uso en contexto', 'Traducción del uso en contexto', 'ISO']);

    conceptos.forEach(conc => {
      conc.lenguas.forEach(leng => {
        leng.variantes.forEach(varObj => {
          datos.push([
            conc.codigo,
            conc.espanol,
            leng.nombre,
            varObj.nombre,
            varObj.traduccion || '',
            varObj.uso || '',
            varObj.traduccionUso || '',
            varObj.iso || ''
          ]);
        });
      });
    });

    if (datos.length === 1) {
      alert('No hay datos para exportar.');
      return;
    }

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(datos);
    XLSX.utils.book_append_sheet(wb, ws, 'Glosario');
    XLSX.writeFile(wb, 'glosario.xlsx');
  }

  // ========== ESCAPE HTML ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  // ========== EVENTOS ==========
  btnAgregarConcepto.addEventListener('click', abrirModalConcepto);
  modalConceptoCancel.addEventListener('click', cerrarModalConcepto);
  modalConcepto.addEventListener('click', (e) => { if (e.target === modalConcepto) cerrarModalConcepto(); });
  modalConceptoConfirm.addEventListener('click', agregarConcepto);
  inputEspanol.addEventListener('input', () => {
    const cod = generarCodigo(inputEspanol.value);
    if (cod) inputCodigo.value = cod;
  });

  btnAgregarVariante.addEventListener('click', abrirModalVariante);
  modalVarianteCancel.addEventListener('click', cerrarModalVariante);
  modalVariante.addEventListener('click', (e) => { if (e.target === modalVariante) cerrarModalVariante(); });
  modalVarianteConfirm.addEventListener('click', agregarVariante);

  btnToggleDerecho.addEventListener('click', () => toggleSidebarDerecho());
  btnCerrarDerecho.addEventListener('click', () => toggleSidebarDerecho(false));
  filtroEsquema.addEventListener('input', renderSidebarDerecho);

  btnExportarExcel.addEventListener('click', exportarExcel);
  btnSeleccionarCarpeta.addEventListener('click', seleccionarCarpeta);

  // ========== INICIALIZACIÓN ==========
  async function init() {
    await restaurarHandle();

    const data = cargarDesdeLocalStorage();
    if (data && data.length > 0) {
      conceptos = data;
      let necesitaGuardar = false;
      conceptos.forEach(conc => {
        if (asegurarLenguasEnConcepto(conc)) necesitaGuardar = true;
      });
      if (necesitaGuardar) guardarEnLocalStorage();
    } else {
      conceptos = [
        {
          id: 'conc_1',
          codigo: 'APL',
          espanol: 'Apelación',
          lenguas: LENGUAS_FIJAS.map(lf => ({
            id: lf.id,
            nombre: lf.nombre,
            variantes: []
          }))
        },
        {
          id: 'conc_2',
          codigo: 'DMD',
          espanol: 'Demanda',
          lenguas: LENGUAS_FIJAS.map(lf => ({
            id: lf.id,
